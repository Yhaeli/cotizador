<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cotizador Eliel</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2e6f40">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* INTERFAZ DE LA APP */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #f4f9f4; 
            margin: 0; 
            padding: 12px; 
            color: #2c3e50; 
        }
        .app-container { 
            max-width: 480px; 
            margin: 0 auto; 
            background: white; 
            padding: 16px; 
            border-radius: 14px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            box-sizing: border-box; 
        }
        h2 { color: #2e6f40; margin: 0 0 2px 0; text-align: center; font-size: 1.3rem; }
        .subtitle { text-align: center; font-size: 0.85rem; color: #7f8c8d; margin-bottom: 14px; }
        
        label { font-weight: bold; display: block; margin-top: 12px; font-size: 0.9rem; color: #4a5568; }
        input, textarea { 
            width: 100%; 
            padding: 11px; 
            margin-top: 5px; 
            box-sizing: border-box; 
            border: 1px solid #cbd5e1; 
            border-radius: 7px; 
            font-size: 0.95rem; 
            font-family: inherit; 
            background-color: #f8fafc;
        }
        
        .input-readonly { background-color: #edf2f7; font-weight: bold; color: #2d3748; }
        .input-total { background-color: #fef2f2; font-weight: bold; color: #b91c1c; }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .btn { 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 0.95rem; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-copy { background-color: #10b981; }
        .btn-img { background-color: #2563eb; }

        #zona-captura-recorte {
            margin-top: 20px;
            width: 100%;
            overflow-x: auto;
        }
        
        /* ======================================================= */
        /* DISEÑO DE HOJA CON PROPORCIÓN DE ASPECTO A4 REAL        */
        /* ======================================================= */
        .recibo-estilizado {
            width: 595px;           /* Ancho base A4 estándar */
            min-height: 842px;      /* Alto mínimo A4 estándar */
            background-color: white;
            box-sizing: border-box;
            padding: 40px;         
            border: 1px solid #cbd5e1; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        
        .recibo-header { 
            text-align: center; 
            font-weight: bold; 
            color: #2e6f40; 
            font-size: 22px; 
            margin-bottom: 15px; 
            border-bottom: 3px solid #2e6f40; 
            padding-bottom: 8px; 
        }
        
        .recibo-meta { 
            margin-bottom: 15px; 
            font-size: 13px; 
            background: #f8fafc; 
            padding: 10px; 
            border: 1px solid #e2e8f0; 
            border-radius: 6px; 
        }
        
        .tabla-productos { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .tabla-productos th { border-bottom: 2px solid #2e6f40; color: #2e6f40; padding: 6px 4px; font-weight: bold; text-align: left; font-size: 12px; }
        .tabla-productos td { border-bottom: 1px dashed #e2e8f0; padding: 6px 4px; color: #334155; font-size: 13px; }
        
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .recibo-resumen { background: #f8fafc; padding: 12px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 15px; font-size: 13px; }
        .recibo-total-destacado { font-size: 16px; font-weight: bold; color: #b91c1c; margin-top: 6px; border-top: 1px solid #e2e8f0; padding-top: 6px; }
        
        .recibo-pagos { background-color: #fdfdfd; padding: 12px; border-radius: 6px; border-left: 4px solid #10b981; border-top: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; font-size: 12.5px; margin-top: 15px; }
        .recibo-importante { font-size: 11.5px; color: #64748b; margin-top: 15px; padding-top: 8px; border-top: 1px solid #e2e8f0; }
        .recibo-importante ul { margin: 4px 0; padding-left: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Vivero Eliel</h2>
    <div class="subtitle">Generador de Cotizaciones A4</div>
    
    <label>Nombre del Cliente:</label> 
    <input type="text" id="cliente" placeholder="Ej: LISA LOWERS" oninput="procesarCotizacion()">
    
    <label>Detalle del pedido:</label>
    <textarea id="pedido-texto" rows="5" placeholder="2 Pepeomia - 10.00" oninput="procesarCotizacion()"></textarea>
    
    <label>Valor de las Plantas (S/.):</label> 
    <input type="number" id="valPlantas" class="input-readonly" value="0.00" readonly>
    
    <label>Embalaje y traslado (S/.):</label> 
    <input
